services:
  db:
    image: postgres:15-alpine
    container_name: acquisitions-db
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=acquisitions
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - acquisitions

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: acquisitions
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      # This tells the app to talk to the 'db' service inside Docker
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/acquisitions
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - acquisitions
    restart: unless-stopped

networks:
  acquisitions-dev:
    driver: bridge
