version: '3.8'

services:
  # Node.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - '${PORT:-3000}:3000'
    environment:
      - NODE_ENV=production
    env_file:
      - .env

    volumes:
      # Persist branch metadata per git branch (optional)
      - ./logs: /app/logs

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512mb'
        reservations:
          cpus: '0.25'
          memory: '256mb'

    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => { process.exit(1) })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - acquisitions-prod

  networks:
    acquisitions-prod:
      driver: bridge
